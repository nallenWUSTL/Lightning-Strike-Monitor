<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Xweather Map</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/leaflet.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/leaflet.js"></script>
    
	<style>
    #map { 
        width: 600px; 
        height: 500px; 
    }
	</style>
</head>
<body>

    <div id="map"></div>
    
	<script> 
        var map = L.map('map').setView([37.21283151445594, -86.748046875], 6);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    		attribution: '&copy; OpenStreetMap contributors'
		}).addTo(map);
    
        L.tileLayer('https://maps{s}.aerisapi.com/q3WCR8cdajh1jYa6gcYyk_UB3WbZYHWFsHfrVniK39h6o6f1f8xDCs0IFceETj/blue-marble,lightning-flash,stormcells,roads,admin-cities-dk/{z}/{x}/{y}/current.png', {
			subdomains: '1234',
			attribution: '<a href="https://www.aerisweather.com/">&copy;Xweather</a>',
		}).addTo(map);
    
    </script>
    
</body>
</html>
